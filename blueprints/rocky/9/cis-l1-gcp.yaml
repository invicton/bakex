# Stratum HardeningBlueprint — Rocky Linux 9 CIS Level 1 Server (GCP)
#
# Download, set your project_id in credentials, and run:
#   stratum build rocky9-cis-l1-gcp
#
# Produces an identical hardened GCP custom image every time.

stratum_version: "0.3.0"
kind: HardeningBlueprint

metadata:
  name: rocky9-cis-l1-gcp
  version: "1.0.0"
  description: >
    CIS Red Hat Enterprise Linux 9 Benchmark — Level 1 Server profile for GCP,
    applied to Rocky Linux 9. SELinux enforcing. Reproducible custom image.
  author: "Vamshi Krishna Santhapuri"
  tags: [rocky, rocky9, rhel9, cis, level1, server, gcp, selinux]

target:
  os: rocky9
  arch: x86_64
  provider: gcp
  # GCP Rocky Linux 9 image family: projects/rocky-linux-cloud/global/images/family/rocky-linux-9
  base_image: projects/rocky-linux-cloud/global/images/family/rocky-linux-9
  instance_type: e2-medium        # 2 vCPU / 4 GB RAM
  root_volume_size_gb: 20

system:
  hostname: hardened-node
  timezone: UTC
  locale: en_US.UTF-8
  selinux_mode: enforcing         # CIS RHEL 9 requires SELinux enforcing

filesystem:
  - device: tmpfs
    mountpoint: /tmp
    fstype: tmpfs
    options: [rw, nosuid, nodev, noexec, relatime]
    size: 2G

  - device: tmpfs
    mountpoint: /var/tmp
    fstype: tmpfs
    options: [rw, nosuid, nodev, noexec, relatime]
    size: 1G

  - device: tmpfs
    mountpoint: /dev/shm
    fstype: tmpfs
    options: [rw, nosuid, nodev, noexec, relatime]

users:
  root:
    lock: true

  accounts:
    - name: stratum-admin
      comment: "Stratum-managed admin account"
      groups:
        - wheel                   # RHEL family uses 'wheel' for sudo
      shell: /bin/bash
      ssh_authorized_keys:
        []                        # Add: - "ssh-ed25519 AAAA..."

compliance:
  benchmark: xccdf_org.ssgproject.content_benchmark_RHEL-9
  profile: xccdf_org.ssgproject.content_profile_cis_server_l1
  # Install on target: dnf install scap-security-guide
  datastream: /usr/share/xml/scap/ssg/content/ssg-rhel9-ds.xml
  fail_on_findings: true
  severity_threshold: medium

controls:
  xccdf_org.ssgproject.content_rule_package_telnet_removed: true
  xccdf_org.ssgproject.content_rule_sshd_disable_root_login:
    enabled: true
    justification: Root SSH login is prohibited by CIS and organisational security policy.
  xccdf_org.ssgproject.content_rule_selinux_state:
    enabled: true
    justification: SELinux must be in enforcing mode per CIS RHEL 9 Level 1.
