# BakeX HardeningBlueprint — AlmaLinux 9 CIS Level 1 Server (AWS)
#
# AlmaLinux 9 is a RHEL 9 binary-compatible rebuild from the CloudLinux team.
# Uses the same SCAP datastream as Rocky Linux / RHEL 9.

bakex_version: "0.5.0"
kind: HardeningBlueprint

metadata:
  name: alma9-cis-l1-aws
  version: "1.0.0"
  description: >
    CIS Red Hat Enterprise Linux 9 Benchmark — Level 1 Server profile for AWS,
    applied to AlmaLinux 9. SELinux enforcing.
  author: "Vamshi Krishna Santhapuri"
  tags:
    - almalinux
    - alma9
    - rhel9
    - cis
    - level1
    - server
    - aws
    - selinux

target:
  os: alma9
  arch: x86_64
  provider: aws
  # AlmaLinux 9 official AMI — find current IDs at:
  # https://wiki.almalinux.org/cloud/AWS.html
  base_image: ami-0f673487d7e5f89ca   # AlmaLinux 9, us-east-1 (check for updates)
  instance_type: t3.medium
  root_volume_size_gb: 20

system:
  hostname: hardened-node
  timezone: UTC
  locale: en_US.UTF-8
  selinux_mode: enforcing

filesystem:
  - device: tmpfs
    mountpoint: /tmp
    fstype: tmpfs
    options: [rw, nosuid, nodev, noexec, relatime]
    size: 2G

  - device: tmpfs
    mountpoint: /var/tmp
    fstype: tmpfs
    options: [rw, nosuid, nodev, noexec, relatime]
    size: 1G

  - device: tmpfs
    mountpoint: /dev/shm
    fstype: tmpfs
    options: [rw, nosuid, nodev, noexec, relatime]

users:
  root:
    lock: true

  accounts:
    - name: bakex-admin
      comment: "BakeX-managed admin account"
      groups:
        - wheel
      shell: /bin/bash
      ssh_authorized_keys:
        []

compliance:
  benchmark: xccdf_org.ssgproject.content_benchmark_RHEL-9
  profile: xccdf_org.ssgproject.content_profile_cis_server_l1
  datastream: /usr/share/xml/scap/ssg/content/ssg-rhel9-ds.xml
  fail_on_findings: true
  severity_threshold: medium

controls:
  xccdf_org.ssgproject.content_rule_package_telnet_removed: true
  xccdf_org.ssgproject.content_rule_sshd_disable_root_login:
    enabled: true
    justification: Root SSH login is prohibited by CIS and organisational security policy.
