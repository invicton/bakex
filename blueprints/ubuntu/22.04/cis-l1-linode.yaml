# BakeX HardeningBlueprint — Ubuntu 22.04 LTS CIS Level 1 Server (Linode)

bakex_version: "0.5.0"
kind: HardeningBlueprint

metadata:
  name: ubuntu22-cis-l1-linode
  version: "1.0.0"
  description: >
    CIS Ubuntu Linux 22.04 LTS Benchmark — Level 1 Server profile for Linode/Akamai Cloud.
    Produces a Linode Private Image (disk snapshot) that can be re-deployed identically.
  author: "Vamshi Krishna Santhapuri"
  tags:
    - ubuntu
    - ubuntu22.04
    - cis
    - level1
    - server
    - linode
    - akamai

target:
  os: ubuntu22.04
  arch: x86_64
  provider: linode
  # Linode image slug — list available images with: linode-cli images list
  base_image: linode/ubuntu22.04
  instance_type: g6-standard-2
  root_volume_size_gb: 50

system:
  hostname: hardened-node
  timezone: UTC
  locale: en_US.UTF-8
  selinux_mode: null

filesystem:
  - device: tmpfs
    mountpoint: /tmp
    fstype: tmpfs
    options: [rw, nosuid, nodev, noexec, relatime]
    size: 2G

  - device: tmpfs
    mountpoint: /var/tmp
    fstype: tmpfs
    options: [rw, nosuid, nodev, noexec, relatime]
    size: 1G

  - device: tmpfs
    mountpoint: /dev/shm
    fstype: tmpfs
    options: [rw, nosuid, nodev, noexec, relatime]

users:
  root:
    lock: true

  accounts:
    - name: bakex-admin
      comment: "BakeX-managed admin account"
      groups:
        - sudo
      shell: /bin/bash
      ssh_authorized_keys:
        []

compliance:
  benchmark: xccdf_org.ssgproject.content_benchmark_UBUNTU2204
  profile: xccdf_org.ssgproject.content_profile_cis_level1_server
  datastream: /usr/share/xml/scap/ssg/content/ssg-ubuntu2204-ds.xml
  fail_on_findings: true
  severity_threshold: medium

controls:
  xccdf_org.ssgproject.content_rule_grub2_enable_selinux:
    enabled: false
    justification: Ubuntu Linux uses AppArmor. SELinux is not applicable.
  xccdf_org.ssgproject.content_rule_package_telnet_removed: true
  xccdf_org.ssgproject.content_rule_sshd_disable_root_login:
    enabled: true
    justification: Root SSH login is prohibited by CIS and organisational security policy.
