---
# Statim Pluggable Hardening Entrypoint
#
# This playbook is executed by the Statim engine during image builds
# when using the 'ansible-galaxy' hardening strategy.

- name: Apply Statim Compliance Hardening
  hosts: all
  become: true
  gather_facts: true

  vars:
    # Set explicitly by catalog plugins, or defaults to "auto"
    statim_lockdown_role: "auto"
    statim_target_os: "ubuntu22"

  pre_tasks:
    - name: Determine ansible-lockdown role from OS
      ansible.builtin.set_fact:
        _auto_role: >-
          {%- if statim_target_os is search('ubuntu22') -%}
            UBUNTU22-CIS
          {%- elif statim_target_os is search('ubuntu24') -%}
            UBUNTU24-CIS
          {%- elif statim_target_os is search('rhel9|rocky9|alma9') -%}
            RHEL9-CIS
          {%- elif statim_target_os is search('debian12') -%}
            DEBIAN12-CIS
          {%- elif statim_target_os is search('amazon2023') -%}
            AMAZON2023-CIS
          {%- else -%}
            UBUNTU22-CIS
          {%- endif -%}
      when: statim_lockdown_role == 'auto'

    - name: Set final role
      ansible.builtin.set_fact:
        final_role: >-
          {{ ("ansible-lockdown." + _auto_role | trim) if statim_lockdown_role == "auto" else statim_lockdown_role }}

    - name: Show selected role
      ansible.builtin.debug:
        msg: "Applying hardening role: {{ final_role | trim }}"

    - name: Install required role locally on Statim Host
      ansible.builtin.command:
        cmd: "ansible-galaxy install {{ final_role | trim }} --force"
      delegate_to: localhost
      changed_when: false
      become: false

  tasks:
    - name: Apply selected hardening role
      ansible.builtin.include_role:
        name: "{{ final_role | trim }}"
