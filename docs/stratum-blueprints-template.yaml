# ─────────────────────────────────────────────────────────────────────────────
# Stratum HardeningBlueprint — Contributor Template
#
# Copy this file to blueprints/<os-slug>/<os-version>/<framework>[-<level>]-<provider>.yaml
# Replace every <PLACEHOLDER> with the real value.
# Delete comments before submitting — they are here for guidance only.
#
# Validation:
#   python - <<'EOF'
#   import yaml
#   from stratum.core.blueprint import ComplianceProfile
#   ComplianceProfile.model_validate(yaml.safe_load(open("your-blueprint.yaml")))
#   print("OK")
#   EOF
# ─────────────────────────────────────────────────────────────────────────────

stratum_version: "0.3.0"
kind: HardeningBlueprint

# ─────────────────────────────────────────────────────────────────────────────
# metadata
# ─────────────────────────────────────────────────────────────────────────────
metadata:
  # Unique across the library. Use the file path slug:
  #   <os-slug><os-version>-<framework>-<level?>-<provider>
  # Examples: rocky9-cis-l2-aws | ubuntu22-hipaa-aws | rhel9-stig-aws
  name: <PLACEHOLDER>

  # SemVer. Start at 1.0.0 for new blueprints.
  version: "1.0.0"

  # One paragraph. For annotated overlays state: which framework version,
  # which CIS/STIG profile is used as the SCAP scan baseline, and any
  # notable design decisions or exclusions.
  description: >
    <PLACEHOLDER>

  # Your name or GitHub handle.
  author: "<PLACEHOLDER>"

  # Include: OS family (rocky, ubuntu, debian, amazon-linux, rhel),
  # OS version (rocky9, ubuntu22), framework (cis, stig, pci-dss-v4, hipaa,
  # fedramp-moderate, iso-27001), level if applicable (level1, level2),
  # and provider (aws, gcp, azure, digitalocean, linode, proxmox).
  tags:
    - <os-family>
    - <os-version>
    - <framework>
    - <provider>

# ─────────────────────────────────────────────────────────────────────────────
# target
# ─────────────────────────────────────────────────────────────────────────────
target:
  # Valid OS identifiers:
  #   amazon-linux-2023 | ubuntu22.04 | ubuntu24.04 | rocky9 | rhel9 | debian12
  os: <PLACEHOLDER>

  arch: x86_64

  # Valid providers:
  #   aws | gcp | azure | digitalocean | linode | proxmox
  provider: <PLACEHOLDER>

  # The provider-specific image reference. Always add a comment with the
  # canonical source so future maintainers can update when the image rotates.
  #
  # AWS:           ami-xxxxxxxxxxxxxxxxx
  #                # Rocky Linux 9 us-east-1 — https://rockylinux.org/cloud-images
  #
  # GCP:           rocky-linux-9
  #                # GCP image family — resolves to latest at build time
  #
  # Azure:         OpenLogic:CentOS:8_5:latest
  #                # Format: publisher:offer:sku:version
  #
  # DigitalOcean:  rockylinux-9-x64
  #                # Slug — https://slugs.do-api.dev
  #
  # Linode:        linode/rocky9
  #                # Image ID — https://api.linode.com/v4/images
  #
  # Proxmox:       local:vztmpl/rocky-9-default.tar.xz
  #                # Template path on Proxmox host
  base_image: <PLACEHOLDER>  # <source URL or path>

  # Instance size. Minimum for reliable hardening builds:
  #   CIS L1:  t3.small (AWS) / e2-small (GCP)
  #   CIS L2:  t3.medium
  #   STIG:    t3.medium / t3.large
  instance_type: t3.medium

  # Root volume size in GB.
  # Minimum: 15 GB. Recommended: 20 GB RHEL-family, 25 GB for STIG.
  root_volume_size_gb: 20

  # Extra volumes — only needed for CIS L2 separate partition layout.
  # For CIS L1 with tmpfs-only layout, remove this block entirely.
  # AWS device names (/dev/sdf onwards) map to NVMe names (/dev/nvme1n1 onwards).
  extra_volumes:
    - device_name: /dev/sdf
      size_gb: 4    # /var
    - device_name: /dev/sdg
      size_gb: 2    # /var/log  (required for CIS L2)
    - device_name: /dev/sdh
      size_gb: 2    # /home

# ─────────────────────────────────────────────────────────────────────────────
# system
# ─────────────────────────────────────────────────────────────────────────────
system:
  hostname: hardened-node
  timezone: UTC
  locale: en_US.UTF-8

  # RHEL-family (rocky, rhel, amazon-linux): set to "enforcing"
  # Ubuntu / Debian:                         set to null (uses AppArmor)
  selinux_mode: <enforcing | null>

# ─────────────────────────────────────────────────────────────────────────────
# filesystem
#
# CIS L1 minimum (all OSes):
#   - /tmp   — tmpfs, nosuid+nodev+noexec
#   - /var/tmp — tmpfs, nosuid+nodev+noexec
#   - /dev/shm — tmpfs, nosuid+nodev+noexec
#
# CIS L2 additional (separate partitions):
#   - /var   — own disk, nosuid
#   - /var/log — own disk, nosuid+nodev+noexec
#   - /home  — own disk, nosuid+nodev
#
# STIG additional:
#   - /var/log/audit — own disk, nosuid+nodev+noexec
# ─────────────────────────────────────────────────────────────────────────────
filesystem:
  # ── Disk-backed mounts (CIS L2 / STIG only) ──────────────────────────────
  # Remove these if using tmpfs-only layout (CIS L1).
  - device: /dev/nvme1n1   # maps from /dev/sdf
    mountpoint: /var
    fstype: xfs
    options: [nosuid]

  - device: /dev/nvme2n1   # maps from /dev/sdg
    mountpoint: /var/log
    fstype: xfs
    options: [nosuid, nodev, noexec]

  - device: /dev/nvme3n1   # maps from /dev/sdh
    mountpoint: /home
    fstype: xfs
    options: [nosuid, nodev]

  # ── tmpfs mounts (required for all levels) ────────────────────────────────
  - device: tmpfs
    mountpoint: /tmp
    fstype: tmpfs
    options: [rw, nosuid, nodev, noexec, relatime]
    size: 2G

  - device: tmpfs
    mountpoint: /var/tmp
    fstype: tmpfs
    options: [rw, nosuid, nodev, noexec, relatime]
    size: 1G

  - device: tmpfs
    mountpoint: /dev/shm
    fstype: tmpfs
    options: [rw, nosuid, nodev, noexec, relatime]

# ─────────────────────────────────────────────────────────────────────────────
# users
# ─────────────────────────────────────────────────────────────────────────────
users:
  root:
    lock: true  # Required by CIS. Disables direct root login.

  accounts:
    - name: stratum-admin
      comment: "Stratum-managed admin account"
      # RHEL-family: wheel | Ubuntu/Debian: sudo
      groups: [<wheel | sudo>]
      shell: /bin/bash
      # Do not embed SSH public keys in the golden image.
      # Inject at launch time via EC2 key pair or cloud-init user data.
      ssh_authorized_keys: []

# ─────────────────────────────────────────────────────────────────────────────
# compliance
# ─────────────────────────────────────────────────────────────────────────────
compliance:
  # Full SCAP benchmark ID. See README Controls Reference → SCAP Profile Reference.
  # Example: xccdf_org.ssgproject.content_benchmark_RHEL-9
  benchmark: xccdf_org.ssgproject.content_benchmark_<PLACEHOLDER>

  # Full SCAP profile ID.
  # Example: xccdf_org.ssgproject.content_profile_cis_server_l2
  profile: xccdf_org.ssgproject.content_profile_<PLACEHOLDER>

  # Path to the SCAP datastream on the target instance.
  # RHEL-family: /usr/share/xml/scap/ssg/content/ssg-rhel9-ds.xml
  # Ubuntu 22.04: /usr/share/xml/scap/ssg/content/ssg-ubuntu2204-ds.xml
  # Ubuntu 24.04: /usr/share/xml/scap/ssg/content/ssg-ubuntu2404-ds.xml
  # Debian 12:    /usr/share/xml/scap/ssg/content/ssg-debian12-ds.xml
  # AL2023:       /usr/share/xml/scap/ssg/content/ssg-al2023-ds.xml
  datastream: /usr/share/xml/scap/ssg/content/<PLACEHOLDER>

  fail_on_findings: true

  # Fail the build if any finding at or above this severity is present.
  # Production blueprints: medium. Development/testing: high.
  severity_threshold: medium

  # Enable AIDE file-integrity database initialisation after hardening.
  # Required for: PCI-DSS Req 11.5.2, STIG RHEL-09-651010, FedRAMP SI-7.
  aide: false

  # Enable FIPS 140-2 mode. Required for: FedRAMP High, DoD IL4/IL5.
  # Warning: not reversible post-build. Test on a non-FIPS baseline first.
  fips: false

# ─────────────────────────────────────────────────────────────────────────────
# hardening
# ─────────────────────────────────────────────────────────────────────────────
hardening:
  strategy: ansible-galaxy

  # Must match the SCAP profile level.
  # cis-l1 | cis-l2 | stig | custom
  profile_tier: <cis-l1 | cis-l2 | stig>

# ─────────────────────────────────────────────────────────────────────────────
# controls — per-rule overrides
#
# Only include rules where the blueprint's intent differs from the SCAP profile.
# Do not copy the entire rule list from the profile — that defeats the purpose.
#
# Justification is MANDATORY when:
#   enabled: false  → you are weakening the baseline (must explain why it is safe)
#   enabled: true   → you are enabling a rule the profile has off (cite the framework)
#
# Justification language: reference the specific control clause.
#   CIS:     "CIS Rocky Linux 9 Benchmark v2.0.0 Section 5.3.4"
#   STIG:    "DISA STIG RHEL 9 STIG v1r3 Rule RHEL-09-255050"
#   PCI-DSS: "PCI-DSS v4.0 Req 8.3.9 — MFA for non-console admin access"
#   HIPAA:   "HIPAA §164.312(a)(2)(i) — Unique User Identification"
#   NIST:    "NIST SP 800-53 Rev5 IA-5(1) — Password-Based Authentication"
#   FedRAMP: "FedRAMP Moderate Baseline IA-5(1)"
#   ISO:     "ISO/IEC 27001:2022 Annex A 8.9 — Configuration Management"
# ─────────────────────────────────────────────────────────────────────────────
controls:
  # Example — enabling a rule not in the base profile:
  # xccdf_org.ssgproject.content_rule_package_aide_installed:
  #   enabled: true
  #   justification: >
  #     PCI-DSS v4.0 Req 11.5.2 requires a change-detection mechanism for
  #     critical system files. AIDE satisfies this requirement and is not
  #     enabled by the CIS L1 profile.

  # Example — disabling a rule with a workload justification:
  # xccdf_org.ssgproject.content_rule_smartcard_auth:
  #   enabled: false
  #   justification: >
  #     Smart card authentication cannot be configured for EC2 instances.
  #     Compensating control: MFA enforced at the AWS IAM level for all
  #     console and API access (PCI-DSS v4.0 Req 8.4 compensating control).

  # Add your overrides below. Remove the examples above before submitting.
  xccdf_org.ssgproject.content_rule_sshd_disable_root_login:
    enabled: true
    justification: >
      Root SSH login is prohibited by <FRAMEWORK> and organisational policy.
      Direct root access is disabled at the OS level; all administrative
      access is via the stratum-admin account.
