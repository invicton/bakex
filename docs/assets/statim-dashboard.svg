<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Statim dashboard screenshot preview</title>
  <desc id="desc">A sanitized preview of the Statim dashboard with build, scan, blueprint, and integration panels.</desc>
  <rect width="1200" height="720" fill="#070b14"/>
  <rect x="24" y="24" width="1152" height="672" rx="18" fill="#0f172a" stroke="#1e293b"/>
  <rect x="24" y="24" width="220" height="672" rx="18" fill="#0b1120"/>
  <text x="56" y="76" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Statim</text>
  <text x="56" y="108" fill="#38bdf8" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">OS HARDENING PLATFORM</text>
  <g font-family="Inter, Arial, sans-serif" font-size="15" fill="#94a3b8">
    <text x="56" y="172">Dashboard</text>
    <text x="56" y="222">Builder</text>
    <text x="56" y="272">Auditor</text>
    <text x="56" y="322">Blueprints</text>
    <text x="56" y="372">Integrations</text>
    <text x="56" y="422">API Keys</text>
  </g>
  <rect x="52" y="147" width="150" height="38" rx="9" fill="#0e7490" opacity=".35"/>
  <text x="284" y="76" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Launch-ready hardening workflow</text>
  <text x="284" y="108" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="15">Build golden images, scan drift, and publish evidence from one self-hosted control plane.</text>
  <g>
    <rect x="284" y="148" width="260" height="128" rx="12" fill="#111827" stroke="#263244"/>
    <text x="312" y="188" fill="#67e8f9" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Golden Images</text>
    <text x="312" y="230" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800">24</text>
    <text x="312" y="254" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="13">Across AWS, Azure, GCP</text>
  </g>
  <g>
    <rect x="572" y="148" width="260" height="128" rx="12" fill="#111827" stroke="#263244"/>
    <text x="600" y="188" fill="#a7f3d0" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Compliance Grade</text>
    <text x="600" y="230" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800">A-</text>
    <text x="600" y="254" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="13">CIS L1 baseline passing</text>
  </g>
  <g>
    <rect x="860" y="148" width="260" height="128" rx="12" fill="#111827" stroke="#263244"/>
    <text x="888" y="188" fill="#fbbf24" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Pipeline Gates</text>
    <text x="888" y="230" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800">SARIF</text>
    <text x="888" y="254" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="13">CI/CD evidence export</text>
  </g>
  <rect x="284" y="320" width="836" height="300" rx="14" fill="#0b1220" stroke="#263244"/>
  <text x="318" y="364" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Recent build pipeline</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="318" y="398" width="760" height="44" rx="8" fill="#111827"/>
    <text x="342" y="425" fill="#e2e8f0" font-size="14">Ubuntu 22.04 CIS L1 on AWS</text>
    <text x="862" y="425" fill="#34d399" font-size="14" font-weight="700">Complete</text>
    <rect x="318" y="458" width="760" height="44" rx="8" fill="#111827"/>
    <text x="342" y="485" fill="#e2e8f0" font-size="14">Rocky 9 CIS L1 on Azure</text>
    <text x="862" y="485" fill="#38bdf8" font-size="14" font-weight="700">Running</text>
    <rect x="318" y="518" width="760" height="44" rx="8" fill="#111827"/>
    <text x="342" y="545" fill="#e2e8f0" font-size="14">Debian 12 CIS L1 on GCP</text>
    <text x="862" y="545" fill="#94a3b8" font-size="14" font-weight="700">Queued</text>
