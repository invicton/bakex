name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.11"
      - run: uv sync --locked --extra all-providers --group dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    name: Tests (pytest ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: ${{ matrix.python }}
      - run: uv sync --locked --extra all-providers --group dev
      - run: uv run pytest tests/ --tb=short --cov=bakex --cov-fail-under=80

  schema:
    name: Validate blueprint YAML schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.11"
      - run: uv sync --locked
      - name: Validate all profiles
        run: |
          uv run python - <<'EOF'
          import sys
          from pathlib import Path
          from bakex.core.blueprint import ComplianceProfile
          import yaml

          errors = []
          profiles_dir = Path("profiles")
          yaml_files = list(profiles_dir.rglob("*.yaml")) + list(profiles_dir.rglob("*.yml"))
          # Skip the generic template — it intentionally has null controls
          skip = {"generic-hardening-blueprint.yaml"}

          for p in sorted(yaml_files):
              if p.name in skip:
                  print(f"  SKIP  {p}")
                  continue
              try:
                  raw = yaml.safe_load(p.read_text())
                  if not isinstance(raw, dict):
                      errors.append(f"  ERROR {p}: top-level is not a mapping")
                      continue
                  ComplianceProfile.model_validate(raw)
                  print(f"  OK    {p}")
              except Exception as exc:
                  errors.append(f"  ERROR {p}: {exc}")

          if errors:
              print("\nSchema validation failed:")
              for e in errors:
                  print(e)
              sys.exit(1)
          else:
              print(f"\nAll {len(yaml_files) - len(skip)} profiles validated successfully.")
          EOF

  validate-blueprints:
    name: Validate community blueprints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.11"
      - run: uv sync --locked
      - name: Validate blueprint schemas
        run: |
          uv run python - <<'EOF'
          import sys
          from pathlib import Path
          from bakex.core.blueprint import ComplianceProfile
          import yaml

          errors = []
          yaml_files = sorted(Path("blueprints").rglob("*.yaml"))

          for p in yaml_files:
              try:
                  raw = yaml.safe_load(p.read_text())
                  if not isinstance(raw, dict):
                      errors.append(f"  ERROR {p}: top-level is not a mapping")
                      continue
                  ComplianceProfile.model_validate(raw)
                  print(f"  OK    {p}")
              except Exception as exc:
                  errors.append(f"  ERROR {p}: {exc}")

          if errors:
              print("\nBlueprint schema validation failed:")
              for e in errors:
                  print(e)
              sys.exit(1)
          else:
              print(f"\nAll {len(yaml_files)} blueprints validated successfully.")
          EOF
      - name: Check index.json consistency
        run: |
          uv run python - <<'EOF'
          import json
          import sys
          from pathlib import Path

          on_disk = {str(p.relative_to("blueprints")) for p in Path("blueprints").rglob("*.yaml")}
          indexed = set(json.loads(Path("blueprints/index.json").read_text()))

          missing_from_index = sorted(on_disk - indexed)
          missing_on_disk = sorted(indexed - on_disk)

          if missing_from_index:
              print("Files on disk but missing from index.json:")
              for f in missing_from_index:
                  print(f"  {f}")
          if missing_on_disk:
              print("Entries in index.json with no file on disk:")
              for f in missing_on_disk:
                  print(f"  {f}")

          if missing_from_index or missing_on_disk:
              sys.exit(1)
          print(f"index.json consistent with {len(on_disk)} blueprint files.")
          EOF

  # Report-only: Invigil grades the repo's doctrine (see README badge); the
  # scorecard lands as a PR comment and in the job summary. Never blocks CI.
  invigil:
    name: Invigil scorecard (report-only)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Invigil scorecard (report-only)
        uses: invigil/invigil@31a39b1acc83d8a1c9c9530179acf772a6ce9438  # v1.5.1
        with:
          enforce: "false"
          # Fork PRs have a read-only token — skip the comment there.
          comment: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
      # The action leaves the CLI installed; regenerate the markdown report
      # for the job summary directly.
      - name: Publish report to job summary
        run: invigil score . --offline --format markdown >> "$GITHUB_STEP_SUMMARY"

  ansible-syntax:
    name: Ansible syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install Ansible
        run: pip install ansible-core
      - name: Check playbook syntax (if site.yml exists)
        run: |
          if [ -f ansible/site.yml ]; then
            ansible-playbook --syntax-check ansible/site.yml
          else
            echo "No ansible/site.yml — skipping"
          fi
