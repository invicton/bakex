name: Bug report
description: Something in BakeX isn't working as documented
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: >-
        Steps to reproduce. If a blueprint triggers it, paste the blueprint YAML
        (redact real credentials / account IDs / AMI IDs); if an API call, the
        `curl` request.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: BakeX version / commit
      placeholder: v0.6.0 / fb0ab77 (`bakex version`)
    validations:
      required: true
  - type: dropdown
    id: how-running
    attributes:
      label: How you're running it
      options:
        - Docker Compose
        - Published image (docker run)
        - PyPI (`bakex serve`)
        - From source (uv)
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider involved (if any)
      options:
        - AWS
        - GCP
        - Azure
        - DigitalOcean
        - Linode
        - Proxmox
        - KVM (local)
        - none / not provider-related
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: >-
        Paste the relevant server logs, build-job log excerpt, or API response —
        include the `error_id` if the UI showed one.
      render: shell
