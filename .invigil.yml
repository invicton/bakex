# Invigil doctrine gate for Invicton (https://github.com/rrskris/invigil).
# Report-only for now: the scorecard is posted as a PR comment and never blocks a
# merge. Flip project.enforce to true once the grade is stable at the target gate.
version: 1

project:
  name: invicton
  language: python
  min_gate: G4
  enforce: false

# Layer 2 — Stranger Gate: what a user actually downloads. Mirrors the probes the
# hand-rolled smoke-published.yml runs today, so the reusable gate can replace it.
artifacts:
  - type: pypi
    name: "invicton[all-providers]"
    env:
      INVICTON_ADMIN_TOKEN: smoke
  - type: ghcr
    image: ghcr.io/invicton/invicton:latest
    port: 8000
    env:
      INVICTON_ADMIN_TOKEN: smoke

probes:
  - url: "/"
    auth: "admin:smoke"
    expect_status: 200
  - url: "/api/blueprints/"
    auth: "admin:smoke"
    expect_json_count: { min: 18 }
  - url: "/api/plugins/catalog"
    auth: "admin:smoke"
    expect_json_count: { min: 5 }
  - url: "/static/js/htmx.min.js"
    auth: "admin:smoke"
    expect_status: 200

boot_budget_minutes: 10
