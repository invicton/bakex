# Stratum HardeningBlueprint — Debian 12 Bookworm CIS Level 1 Server (AWS)

stratum_version: "0.5.0"
kind: HardeningBlueprint

metadata:
  name: debian12-cis-l1-aws
  version: "1.0.0"
  description: >
    CIS Debian Linux 12 Benchmark — Level 1 Server profile for AWS.
    Uses AppArmor (Debian default). Suitable for most production workloads.
  author: "Vamshi Krishna Santhapuri"
  tags:
    - debian
    - debian12
    - bookworm
    - cis
    - level1
    - server
    - aws

target:
  os: debian12
  arch: x86_64
  provider: aws
  # Debian 12 official AWS AMI — find current IDs at:
  # https://wiki.debian.org/Cloud/AmazonEC2Image
  base_image: ami-058bd2d568351da34   # Debian 12, us-east-1 (check for updates)
  instance_type: t3.medium
  root_volume_size_gb: 20

system:
  hostname: hardened-node
  timezone: UTC
  locale: en_US.UTF-8
  selinux_mode: null               # Debian uses AppArmor; skip SELinux configuration

filesystem:
  - device: tmpfs
    mountpoint: /tmp
    fstype: tmpfs
    options: [rw, nosuid, nodev, noexec, relatime]
    size: 2G

  - device: tmpfs
    mountpoint: /var/tmp
    fstype: tmpfs
    options: [rw, nosuid, nodev, noexec, relatime]
    size: 1G

  - device: tmpfs
    mountpoint: /dev/shm
    fstype: tmpfs
    options: [rw, nosuid, nodev, noexec, relatime]

users:
  root:
    lock: true

  accounts:
    - name: stratum-admin
      comment: "Stratum-managed admin account"
      groups:
        - sudo
      shell: /bin/bash
      ssh_authorized_keys:
        []

compliance:
  benchmark: xccdf_org.ssgproject.content_benchmark_DEBIAN12
  profile: xccdf_org.ssgproject.content_profile_cis_level1_server
  # Install on target: apt install ssg-debderived
  datastream: /usr/share/xml/scap/ssg/content/ssg-debian12-ds.xml
  fail_on_findings: true
  severity_threshold: medium

controls:
  xccdf_org.ssgproject.content_rule_grub2_enable_selinux:
    enabled: false
    justification: Debian 12 uses AppArmor. SELinux is not applicable.
  xccdf_org.ssgproject.content_rule_package_telnet_removed: true
  xccdf_org.ssgproject.content_rule_sshd_disable_root_login:
    enabled: true
    justification: Root SSH login is prohibited by CIS and organisational security policy.
