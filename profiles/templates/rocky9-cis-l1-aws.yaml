# BakeX HardeningBlueprint — Rocky Linux 9 CIS Level 1 Server (AWS)
#
# Rocky Linux is a 1:1 RHEL binary-compatible rebuild.
# This blueprint targets the RHEL 9 CIS benchmark (also valid for Rocky 9).

bakex_version: "0.5.0"
kind: HardeningBlueprint

metadata:
  name: rocky9-cis-l1-aws
  version: "1.0.0"
  description: >
    CIS Red Hat Enterprise Linux 9 Benchmark — Level 1 Server profile for AWS,
    applied to Rocky Linux 9. SELinux enforcing. Suitable for most production
    workloads with minimal performance impact.
  author: "Vamshi Krishna Santhapuri"
  tags:
    - rocky
    - rocky9
    - rhel9
    - cis
    - level1
    - server
    - aws
    - selinux

target:
  os: rocky9
  arch: x86_64
  provider: aws
  # Rocky Linux 9 official AMI — find current IDs at:
  # https://rockylinux.org/cloud-images
  base_image: ami-067daee80a6d36ac0   # Rocky Linux 9, us-east-1 (check for updates)
  instance_type: t3.medium
  root_volume_size_gb: 20

system:
  hostname: hardened-node
  timezone: UTC
  locale: en_US.UTF-8
  selinux_mode: enforcing            # CIS RHEL 9 requires SELinux in enforcing mode

filesystem:
  - device: tmpfs
    mountpoint: /tmp
    fstype: tmpfs
    options: [rw, nosuid, nodev, noexec, relatime]
    size: 2G

  - device: tmpfs
    mountpoint: /var/tmp
    fstype: tmpfs
    options: [rw, nosuid, nodev, noexec, relatime]
    size: 1G

  - device: tmpfs
    mountpoint: /dev/shm
    fstype: tmpfs
    options: [rw, nosuid, nodev, noexec, relatime]

users:
  root:
    lock: true

  accounts:
    - name: bakex-admin
      comment: "BakeX-managed admin account"
      groups:
        - wheel                    # RHEL family uses 'wheel' for sudo
      shell: /bin/bash
      ssh_authorized_keys:
        []                         # Add: - "ssh-ed25519 AAAA..."

compliance:
  benchmark: xccdf_org.ssgproject.content_benchmark_RHEL-9
  profile: xccdf_org.ssgproject.content_profile_cis_server_l1
  # Install on target: dnf install scap-security-guide
  datastream: /usr/share/xml/scap/ssg/content/ssg-rhel9-ds.xml
  fail_on_findings: true
  severity_threshold: medium

controls:
  xccdf_org.ssgproject.content_rule_package_telnet_removed: true
  xccdf_org.ssgproject.content_rule_sshd_disable_root_login:
    enabled: true
    justification: Root SSH login is prohibited by CIS and organisational security policy.
  # SELinux policy — enforcing is required; this enables it
  xccdf_org.ssgproject.content_rule_selinux_state:
    enabled: true
    justification: SELinux must be in enforcing mode per CIS RHEL 9 Level 1.
