{% if yaml_warning %}
<div class="mb-4 px-4 py-3 bg-amber-900/30 border-l-4 border-amber-500 rounded text-xs text-amber-200 shadow-sm flex items-start gap-3">
  <svg class="w-4 h-4 text-amber-500 shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
  <div>
    <p class="font-bold text-amber-400 mb-0.5">Validation Requirement</p>
    <p>{{ yaml_warning }}</p>
  </div>
</div>
{% endif %}
<pre class="text-xs text-slate-300 whitespace-pre-wrap break-all leading-relaxed font-mono selection:bg-brand-500/30">{{ yaml_content }}</pre>
