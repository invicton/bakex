<div class="h-full flex flex-col pt-4">
  <div class="px-8 pb-4 border-b border-slate-800/50 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-lg bg-slate-800 border border-slate-700/50 flex items-center justify-center">
        <span class="text-xs font-bold text-slate-300 uppercase tracking-wider">AZ</span>
      </div>
      <div>
        <h2 class="text-xl font-bold text-white capitalize">Azure Configuration</h2>
        <p class="text-sm text-slate-400">Manage Microsoft Azure access for managed image builds.</p>
      </div>
    </div>
  </div>

  <div class="flex-1 overflow-y-auto p-8">
    <div class="mb-6 rounded-lg border border-sky-900/40 bg-sky-950/10 p-4">
      <div class="flex flex-col gap-3 xl:flex-row xl:items-center xl:justify-between">
        <div>
          <h3 class="text-sm font-semibold text-sky-300">Onboard Azure with ARM templates</h3>
          <p class="mt-1 text-xs text-slate-400">
            An Azure admin must deploy the template or manually grant the reviewed permission set before Stratum can manage scoped build resources.
          </p>
        </div>
        <div class="flex flex-wrap gap-2">
          <a href="https://portal.azure.com/#create/Microsoft.Template/uri/https%3A%2F%2Fraw.githubusercontent.com%2Frrskris%2FStratum%2Fmain%2Fdeploy%2Fazure%2Fstratum-scanner-role.json"
             target="_blank"
             rel="noopener noreferrer"
             class="inline-flex items-center justify-center rounded-lg border border-sky-700/60 bg-sky-600/15 px-3 py-2 text-xs font-semibold text-sky-200 hover:bg-sky-600/25">
            Scanner Role
          </a>
          <a href="https://portal.azure.com/#create/Microsoft.Template/uri/https%3A%2F%2Fraw.githubusercontent.com%2Frrskris%2FStratum%2Fmain%2Fdeploy%2Fazure%2Fstratum-builder-role.json"
             target="_blank"
             rel="noopener noreferrer"
             class="inline-flex items-center justify-center rounded-lg border border-amber-700/60 bg-amber-600/15 px-3 py-2 text-xs font-semibold text-amber-200 hover:bg-amber-600/25">
            Builder Role
          </a>
          <a href="https://github.com/rrskris/Stratum/tree/main/deploy/azure"
             target="_blank"
             rel="noopener noreferrer"
             class="inline-flex items-center justify-center rounded-lg border border-slate-700 bg-slate-800/70 px-3 py-2 text-xs font-semibold text-slate-200 hover:bg-slate-700">
            Review Permissions
          </a>
        </div>
      </div>
    </div>

    <form
      hx-post="/api/integrations/azure"
      hx-target="#azure-status"
      hx-swap="innerHTML"
      class="space-y-5"
    >
      <div class="grid grid-cols-2 gap-5">
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Tenant ID <span class="text-rose-400">*</span></label>
          <input type="text" name="tenant_id" value="{{ creds.tenant_id if creds else '' }}"
            class="w-full bg-slate-900/50 border border-slate-700/80 rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all font-mono" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Subscription ID <span class="text-rose-400">*</span></label>
          <input type="text" name="subscription_id" value="{{ creds.subscription_id if creds else '' }}"
            class="w-full bg-slate-900/50 border border-slate-700/80 rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all font-mono" />
        </div>
      </div>
      <div class="grid grid-cols-2 gap-5">
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">App (Client) ID <span class="text-rose-400">*</span></label>
          <input type="text" name="client_id" value="{{ creds.client_id if creds else '' }}"
            class="w-full bg-slate-900/50 border border-slate-700/80 rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all font-mono" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Client Secret <span class="text-rose-400">*</span></label>
          <input type="password" name="client_secret" value="{{ creds.client_secret if creds else '' }}"
            class="w-full bg-slate-900/50 border border-slate-700/80 rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all font-mono" />
        </div>
      </div>
      <div class="grid grid-cols-2 gap-5">
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Resource Group <span class="text-rose-400">*</span></label>
          <input type="text" name="resource_group" value="{{ creds.resource_group if creds else 'stratum-builds' }}"
            class="w-full bg-slate-900/50 border border-slate-700/80 rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all font-mono" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Azure Region</label>
          <input type="text" name="location" value="{{ creds.location if creds else 'eastus' }}"
            class="w-full bg-slate-900/50 border border-slate-700/80 rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all font-mono" />
        </div>
      </div>
      <div class="grid grid-cols-2 gap-5">
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">VM Size</label>
          <input type="text" name="vm_size" value="{{ creds.vm_size if creds else 'Standard_D2s_v3' }}"
            class="w-full bg-slate-900/50 border border-slate-700/80 rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all font-mono" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">VNet Name</label>
          <input type="text" name="vnet_name" value="{{ creds.vnet_name if creds else '' }}"
            class="w-full bg-slate-900/50 border border-slate-700/80 rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all font-mono" />
        </div>
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Subnet Name</label>
        <input type="text" name="subnet_name" value="{{ creds.subnet_name if creds else '' }}"
          class="w-full bg-slate-900/50 border border-slate-700/80 rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all font-mono" />
      </div>

      <div class="pt-4 flex flex-col gap-4 border-t border-slate-800/50">
        <div class="flex items-start justify-between">
          <div class="flex items-center gap-3">
            <button type="submit" class="px-5 py-2.5 bg-brand-600 hover:bg-brand-500 text-white text-sm font-semibold rounded-lg transition-all shadow-[0_0_15px_rgba(6,182,212,0.3)] min-w-[120px]">Update Config</button>
            <button type="button" hx-post="/api/integrations/azure/test" hx-include="closest form" hx-target="#azure-status" hx-swap="innerHTML"
              class="px-5 py-2.5 bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-600 hover:border-slate-500 text-sm font-semibold rounded-lg transition-all">Test Connectivity</button>
          </div>
        </div>
        <div id="azure-status" class="w-full"></div>
      </div>
    </form>
  </div>
</div>
