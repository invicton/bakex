AWSTemplateFormatVersion: "2010-09-09"
Description: "Stratum scanner onboarding role and EC2 SSM instance profile."

Parameters:
  TrustedPrincipalArn:
    Type: String
    Description: "IAM user or role ARN allowed to assume the Stratum scanner role."
    AllowedPattern: "^arn:aws:iam::[0-9]{12}:(user|role)/.+$"
  ExternalId:
    Type: String
    Description: "Unique ExternalId that must also be configured in Stratum."
    MinLength: 8
  RoleNamePrefix:
    Type: String
    Default: "Stratum"
    Description: "Prefix for IAM roles and instance profile names."
    AllowedPattern: "^[A-Za-z0-9+=,.@_-]{1,32}$"

Resources:
  StratumScannerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${RoleNamePrefix}ScannerRole"
      Description: "Role assumed by Stratum to scan AWS images and instances."
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref TrustedPrincipalArn
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      Policies:
        - PolicyName: StratumScannerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadEc2Inventory
                Effect: Allow
                Action:
                  - ec2:DescribeImages
                  - ec2:DescribeInstances
                  - ec2:DescribeInstanceStatus
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeSubnets
                  - ec2:DescribeVpcs
                  - ec2:DescribeVolumes
                  - ec2:DescribeTags
                Resource: "*"
              - Sid: LaunchAndCleanTemporaryScanInstances
                Effect: Allow
                Action:
                  - ec2:RunInstances
                  - ec2:TerminateInstances
                  - ec2:CreateTags
                Resource: "*"
              - Sid: SendScanCommands
                Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ssm:GetCommandInvocation
                  - ssm:ListCommandInvocations
                  - ssm:DescribeInstanceInformation
                Resource: "*"
              - Sid: PassStratumInstanceProfile
                Effect: Allow
                Action: iam:PassRole
                Resource: !GetAtt StratumInstanceRole.Arn
                Condition:
                  StringEquals:
                    iam:PassedToService: ec2.amazonaws.com

  StratumInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${RoleNamePrefix}ScannerInstanceRole"
      Description: "Instance role for temporary Stratum scan instances managed through SSM."
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  StratumInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${RoleNamePrefix}ScannerInstanceProfile"
      Roles:
        - !Ref StratumInstanceRole

Outputs:
  StratumRoleArn:
    Description: "Paste this into Stratum as Role ARN."
    Value: !GetAtt StratumScannerRole.Arn
  ExternalId:
    Description: "Paste the ExternalId parameter value into Stratum as External ID."
    Value: !Ref ExternalId
  InstanceProfileName:
    Description: "Paste this into Stratum as IAM Instance Profile Name."
    Value: !Ref StratumInstanceProfile
  RegionHint:
    Description: "Region where this stack was created."
    Value: !Ref AWS::Region
