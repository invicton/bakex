AWSTemplateFormatVersion: "2010-09-09"
Description: "Statim scanner onboarding role and EC2 SSM instance profile."

Parameters:
  TrustedPrincipalArn:
    Type: String
    Default: ""
    Description: "Optional IAM principal allowed to assume the Statim scanner role. Leave blank for test stacks to trust this AWS account root; use a specific IAM user or role ARN for production."
    AllowedPattern: "^$|^arn:aws:iam::[0-9]{12}:((user|role)/.+|root)$"
  ExternalId:
    Type: String
    Default: "statim-onboarding"
    Description: "ExternalId that must also be configured in Statim. Replace the default with a customer-unique value for production."
    MinLength: 8
  RoleNamePrefix:
    Type: String
    Default: "Statim"
    Description: "Prefix for IAM roles and instance profile names."
    AllowedPattern: "^[A-Za-z0-9+=,.@_-]{1,32}$"

Conditions:
  UseDefaultTrustedPrincipal: !Equals [!Ref TrustedPrincipalArn, ""]

Resources:
  StatimScannerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${RoleNamePrefix}ScannerRole"
      Description: "Role assumed by Statim to scan AWS images and instances."
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !If
                - UseDefaultTrustedPrincipal
                - !Sub "arn:aws:iam::${AWS::AccountId}:root"
                - !Ref TrustedPrincipalArn
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      Policies:
        - PolicyName: StatimScannerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadEc2Inventory
                Effect: Allow
                Action:
                  - ec2:DescribeImages
                  - ec2:DescribeInstances
                  - ec2:DescribeInstanceStatus
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeSubnets
                  - ec2:DescribeVpcs
                  - ec2:DescribeVolumes
                  - ec2:DescribeTags
                Resource: "*"
              - Sid: LaunchAndCleanTemporaryScanInstances
                Effect: Allow
                Action:
                  - ec2:RunInstances
                  - ec2:TerminateInstances
                  - ec2:CreateTags
                Resource: "*"
              - Sid: SendScanCommands
                Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ssm:GetCommandInvocation
                  - ssm:ListCommandInvocations
                  - ssm:DescribeInstanceInformation
                Resource: "*"
              - Sid: PassStatimInstanceProfile
                Effect: Allow
                Action: iam:PassRole
                Resource: !GetAtt StatimInstanceRole.Arn
                Condition:
                  StringEquals:
                    iam:PassedToService: ec2.amazonaws.com

  StatimInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${RoleNamePrefix}ScannerInstanceRole"
      Description: "Instance role for temporary Statim scan instances managed through SSM."
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  StatimInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${RoleNamePrefix}ScannerInstanceProfile"
      Roles:
        - !Ref StatimInstanceRole

Outputs:
  StatimRoleArn:
    Description: "Paste this into Statim as Role ARN."
    Value: !GetAtt StatimScannerRole.Arn
  ExternalId:
    Description: "Paste the ExternalId parameter value into Statim as External ID."
    Value: !Ref ExternalId
  InstanceProfileName:
    Description: "Paste this into Statim as IAM Instance Profile Name."
    Value: !Ref StatimInstanceProfile
  RegionHint:
    Description: "Region where this stack was created."
    Value: !Ref AWS::Region
